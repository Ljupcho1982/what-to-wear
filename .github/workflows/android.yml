name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm install

      - name: Run engine tests
        run: node --test

      - name: Check for signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.PLAY_KEYSTORE_B64 }}" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"; else echo "ready=false" >> "$GITHUB_OUTPUT"; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Sync Capacitor (assembles www/ then copies into android/)
        run: npm run sync

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk WhatToWear.apk

      - name: Decode release keystore
        if: steps.signing.outputs.ready == 'true'
        run: echo "${{ secrets.PLAY_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed release AAB (for Google Play)
        if: steps.signing.outputs.ready == 'true'
        env:
          PLAY_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          PLAY_STORE_PASSWORD: ${{ secrets.PLAY_STORE_PASSWORD }}
          PLAY_KEY_ALIAS: ${{ secrets.PLAY_KEY_ALIAS }}
          PLAY_KEY_PASSWORD: ${{ secrets.PLAY_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace
          cp app/build/outputs/bundle/release/app-release.aab ../WhatToWear.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhatToWear-build
          path: |
            WhatToWear.apk
            WhatToWear.aab
          if-no-files-found: warn

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: What to Wear (latest build)
          files: |
            WhatToWear.apk
            WhatToWear.aab
          body: |
            Latest build of the What to Wear Android app.
            • **WhatToWear.apk** — install directly on a phone (allow "install unknown apps").
            • **WhatToWear.aab** — signed Android App Bundle to upload to Google Play (only present once signing secrets are configured).
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
